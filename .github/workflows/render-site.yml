name: Render and publish website

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::quarto
            any::rmarkdown
            any::fs
            any::whoami

      - name: Install babelquarto from R-universe
        run: |
          install.packages(
            "babelquarto",
            repos = c("https://ropensci.r-universe.dev", getOption("repos"))
          )
        shell: Rscript {0}


      - name: Render website
        run: |
          Rscript -e 'babelquarto::render_website(site_url = "https://maevolab.mx")'

      - name: Commit and push rendered site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: render site [skip ci]"
          git push
